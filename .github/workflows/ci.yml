name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pillar-ordered gates (CLAUDE.md §8): typecheck → schema/unit → build → supply-chain.
  # (perf-budgets, seo-schema, a11y, visual-regression run in perf-seo-a11y.yml, which
  #  activates in Phase 1 when real pages exist.)
  build-test:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: https://www.braiinstation.com
      PUBLIC_SUPABASE_URL: https://example.supabase.co
      PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
    steps:
      - uses: actions/checkout@v4 # TODO: Renovate pins actions to SHAs
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (astro check — .astro + ts)
        run: npm run check
      - name: Typecheck (tsc — tests + packages)
        run: npm run typecheck
      - name: Format check
        run: npm run format:check
      - name: Unit + schema + authz tests
        run: npm run test
      - name: A11y — WCAG AA contrast gate (token-level, browser-free)
        run: npm run a11y:contrast
      - name: Build (Cloudflare adapter)
        run: npm run build

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # TODO: Renovate pins actions to SHAs
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Blocking: high+critical in PRODUCTION deps (what ships in the Worker bundle).
      # Accepted advisories are documented + expiring in scripts/audit-gate.mjs — no
      # blanket suppression. Fails on any new prod high/critical or an expired entry.
      - name: Audit — production deps (blocking, documented allowlist)
        run: npm run audit
      # Informational: full tree incl. dev tooling (vitest, lighthouse, …). Surfaces
      # dev-only advisories without halting feature work — they never ship.
      - name: Audit — full tree incl. dev (informational)
        run: npm audit --audit-level=high || true
